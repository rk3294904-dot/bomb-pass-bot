<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💣 Bomb Pass</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <h1>💣 BOMB PASS</h1>
            <p class="subtitle">Guess the word from emoji hints!</p>
        </div>

        <!-- GAME AREA -->
        <div class="game-area">
            <div class="timer-bar">
                <div class="timer-fill" id="timerFill"></div>
            </div>
            <div class="timer-text" id="timerText">30s</div>
            
            <div class="emoji-display" id="emojiDisplay">
                🎣 + 👨
            </div>
            
            <div class="input-area">
                <input type="text" id="guessInput" placeholder="Type your guess..." autocomplete="off">
                <button id="guessBtn">🎯 Guess</button>
            </div>
            
            <div class="message" id="message"></div>
            
            <div class="score-area">
                <span>✅ <span id="correctCount">0</span></span>
                <span>💰 <span id="coinCount">0</span></span>
            </div>
        </div>

        <!-- BUTTONS -->
        <div class="buttons">
            <button class="btn primary" id="startBtn">🚀 Start Solo</button>
            <button class="btn secondary" id="newWordBtn">🔄 New Word</button>
        </div>

        <!-- LEADERBOARD -->
        <div class="leaderboard" id="leaderboard">
            <h3>🏆 Top Players</h3>
            <div id="leaderboardList">Loading...</div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
